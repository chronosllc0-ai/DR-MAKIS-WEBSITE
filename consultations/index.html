<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Book personalized consultations with Dr. William Makis. Choose from initial, follow-up, protocol review, and extended support packages."
    />
    <title>Dr. William Makis | Consultations</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/consultations.js"></script>

    <!-- Smartsupp Live Chat script -->
    <script type="text/javascript">
      var _smartsupp = _smartsupp || {};
      _smartsupp.key = 'f25db0a326a4529dc1a69b9ad0601d1e54185b2a';
      window.smartsupp ||
        (function (d) {
          var s,
            c,
            o = (smartsupp = function () {
              o._.push(arguments);
            });
          o._ = [];
          s = d.getElementsByTagName('script')[0];
          c = d.createElement('script');
          c.type = 'text/javascript';
          c.charset = 'utf-8';
          c.async = true;
          c.src = 'https://www.smartsuppchat.com/loader.js?';
          s.parentNode.insertBefore(c, s);
        })(document);

      window.addEventListener('load', function () {
        var attempts = 0;
        var ensureLauncher = setInterval(function () {
          attempts += 1;
          try {
            if (window.smartsupp) {
              smartsupp('chat:show');
              smartsupp('button:show');
              clearInterval(ensureLauncher);
            }
          } catch (e) {
            // keep retrying briefly until widget API is ready
          }
          if (attempts > 40) clearInterval(ensureLauncher);
        }, 250);
      });
    </script>
  </body>
</html>
