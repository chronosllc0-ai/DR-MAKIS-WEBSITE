[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/checkout"
  to = "/checkout/"
  status = 301

[[redirects]]
  from = "/consultations"
  to = "/consultations/"
  status = 301

[[redirects]]
  from = "/api/checkout"
  to = "/.netlify/functions/checkout"
  status = 200
